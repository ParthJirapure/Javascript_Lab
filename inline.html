<!DOCTYPE html>
<html>
<head>
    <title>Inline JavaScript</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#43cea2,#185a9d);
            font-family:Arial,sans-serif;
        }
        .box{
            text-align:center;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }
        h1{color:#1565c0;}
        h2{color:#c2185b;}
        p{
            color:#2e7d32;
            font-size:20px;
            font-weight:bold;
        }
        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#ff5722;
            color:white;
            font-size:18px;
            cursor:pointer;
        }
        button:hover{
            background:#e64a19;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Inline JavaScript Example</h1>
    <h2>Student Details</h2>
    <p>Name : Parth Jirapure</p>
    <p>PRN : 24070521243</p>
    <p>Semester : 5th</p>
    <p>Section : D</p>

    <button onclick="console.log('Server Environment : Development'); console.log('Welcome Parth Jirapure!');">
        Click Here
    </button>
</div>

</body>
</html>
